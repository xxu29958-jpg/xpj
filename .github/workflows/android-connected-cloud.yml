name: Android Connected Cloud

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"
    paths:
      - "android/app/src/**"
      - "android/gradle/**"
      - "android/app/build.gradle.kts"
      - "android/build.gradle.kts"
      - "android/gradle.properties"
      - "android/gradlew"
      - "android/gradlew.bat"
      - "android/settings.gradle.kts"
      - ".github/workflows/android-connected-cloud.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/app/src/**"
      - "android/gradle/**"
      - "android/app/build.gradle.kts"
      - "android/build.gradle.kts"
      - "android/gradle.properties"
      - "android/gradlew"
      - "android/gradlew.bat"
      - "android/settings.gradle.kts"
      - ".github/workflows/android-connected-cloud.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  connected:
    name: Connected (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TICKETBOX_SERVER_URL: https://api.zen70.cn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run connected tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot-save
          working-directory: android
          script: |
            chmod +x ./gradlew
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            echo "ticketbox.serverUrl=$TICKETBOX_SERVER_URL" >> local.properties
            ./gradlew --no-daemon :app:connectedGrayDebugAndroidTest
