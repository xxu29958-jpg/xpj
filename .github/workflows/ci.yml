name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: windows-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # ADR-0038 PR-Δ gate needs to ``git show <base_ref>:...`` to read
          # the base baseline; shallow clone (fetch-depth: 1, the default)
          # can't reach it and the gate FAILs in PR CI rather than silently
          # downgrading to strict-equality-only.
          fetch-depth: 0

      - name: Check PowerShell scripts
        working-directory: .
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\check_text_encoding.ps1
          powershell -ExecutionPolicy Bypass -File scripts\check_dependency_versions.ps1
          $roots = @("backend/scripts", "android/scripts", "scripts") | Where-Object { Test-Path $_ }
          $files = Get-ChildItem -Path $roots -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($file.FullName)
            $hasBom = $bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF
            if (-not $hasBom) {
              throw "$($file.FullName) must be UTF-8 with BOM for Windows PowerShell 5.1"
            }
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw -Encoding UTF8 -LiteralPath $file.FullName), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$($file.FullName) syntax error: $($errors[0].Message)"
            }
            Write-Host "OK $($file.FullName)"
          }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile
        run: python -m compileall app scripts tests

      - name: Lint
        run: ruff check app scripts tests

      - name: Audit (release lanes)
        # Single PR gate for every read-only audit. New lanes added
        # to scripts/release_audit.py::LANES are automatically gated
        # here — that's the "sediment the workflow" contract.
        # Today: service-graph cycles + CI-gap whitelist + codebase
        # smell report. Any lane that returns non-zero fails the PR.
        run: python scripts\release_audit.py

      - name: Test
        run: python -m pytest --cov=app --cov-report=term-missing

      - name: API contract
        run: python scripts\check_api_contract.py

      - name: Smoke test
        run: python scripts\smoke_test.py

      - name: Dependency vulnerability scan (pip-audit)
        # v1.1 Batch 3: fail the PR on any known-vulnerable Python
        # dependency. ``--strict`` makes warnings (yanked package, etc.)
        # also fail; ``--vulnerability-service osv`` uses the public OSV
        # database (no auth, no GHSA-token gymnastics).
        run: |
          python -m pip install pip-audit
          python -m pip_audit --strict --vulnerability-service osv -r requirements.txt -r requirements-dev.txt

  backend-postgres:
    name: Backend (PostgreSQL)
    # ADR-0041 phase-1 dialect-proofing. The Backend job above runs the suite
    # on SQLite (dev dialect); this lane exercises the production-bound
    # PostgreSQL engine — an end-to-end smoke plus the pytest suite (minus the
    # SQLite-only migrator/backup tests, see conftest) — so dialect drift fails
    # a PR instead of surfacing at cut-over. Linux runner because GitHub Actions
    # service containers (Postgres) only attach to Linux jobs.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xpj_smoke
        ports:
          - 5432:5432
        # CI speed-up: put the data dir on tmpfs (RAM). The PG suite is
        # I/O-bound — the run flushes hundreds of MB of checkpoints/WAL to disk
        # under fsync — and a RAM-backed data dir makes those ~free. Safe
        # because this database is ephemeral per run; durability is irrelevant
        # in CI. (fsync=off would shave a little more but needs a command
        # override the services: block can't express, so tmpfs is the lever.)
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        # requirements-dev.txt (-> requirements.txt) for the app + psycopg +
        # uvicorn (smoke) and pytest (the PG suite step below).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Verify PostgreSQL is reachable
        # Guards against a vacuous green: if SMOKE_DATABASE_URL is ever dropped
        # or renamed the smoke would silently fall back to SQLite and still
        # pass. Read the same var the smoke reads, assert it is Postgres, and
        # connect — fail loud here if the lane isn't actually exercising PG.
        env:
          SMOKE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
        run: |
          python -c "import os, psycopg; url = os.environ['SMOKE_DATABASE_URL']; assert url.startswith('postgresql'), url; psycopg.connect(url.replace('+psycopg', '')).close(); print('PG reachable:', url.rsplit('@', 1)[-1])"

      - name: PostgreSQL end-to-end smoke (ADR-0041)
        # Drives the full bootstrap -> pair -> upload -> OCR -> OCC-token
        # confirm flow against a real PostgreSQL via psycopg. Proves: the
        # SQLite-only startup machinery (migrate_sqlite_schema, PRAGMA-FK,
        # file backup, integrity validators) no-ops cleanly; Alembic replay on
        # a fresh DB is dialect-safe; create_all builds the schema; and the
        # timestamptz ``updated_at`` OCC predicate matches under the pinned
        # UTC session. None of these are observable on the SQLite lane.
        env:
          SMOKE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
        run: python scripts/smoke_test.py

      - name: PostgreSQL backup/restore recovery drill (ADR-0041 phase-2)
        # Dumps the smoke-populated DB through the real backend backup code
        # (backup_service.create_manual_backup -> pg_dump -Fc), validates the
        # archive (pg_restore --list), restores into a FRESH database, and
        # asserts the key tables round-tripped with identical row counts. Proves
        # the Postgres backup path is restorable. Runs before the pytest suite
        # mutates xpj_smoke; uses its own xpj_restore so it collides with nothing.
        env:
          DRILL_SOURCE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
          DRILL_RESTORE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_restore
        run: |
          python -c "import psycopg; c = psycopg.connect('postgresql://postgres:postgres@localhost:5432/postgres'); c.autocommit = True; c.execute('DROP DATABASE IF EXISTS xpj_restore'); c.execute('CREATE DATABASE xpj_restore'); c.close()"
          python scripts/postgres_backup_drill.py

      - name: PostgreSQL data-migration round-trip (ADR-0041 phase-2)
        # Seeds a throwaway SQLite source and migrates it into a FRESH PG
        # database (its own, so it never collides with the smoke / pytest data),
        # asserting reconciliation passes and the two landmines hold: the
        # sequence is advanced past the copied ids (setval) and timestamps land
        # as the same UTC instant (timestamptz). Proves the cut-over machinery
        # works without needing the home-server PostgreSQL.
        env:
          PGTARGET: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_migrate
        run: |
          python -c "import psycopg; c = psycopg.connect('postgresql://postgres:postgres@localhost:5432/postgres'); c.autocommit = True; c.execute('DROP DATABASE IF EXISTS xpj_migrate'); c.execute('CREATE DATABASE xpj_migrate'); c.close()"
          python scripts/migration_roundtrip_check.py --target "$PGTARGET"

      - name: PostgreSQL pytest suite (ADR-0041)
        # The pytest suite against real PostgreSQL — the comprehensive dialect
        # catch the happy-path smoke can't reach (it exercises every
        # service/route/query/OCC path on Postgres). conftest skips the
        # SQLite-only machinery on a non-sqlite engine: file_backed_only +
        # test_database_migration_* (the migrate_sqlite_schema replay, a no-op
        # on PG) + anything marked sqlite_only. Runs after the smoke so a broken
        # startup fails fast before the slower suite.
        env:
          XPJ_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
        # -ra summarises non-passing tests; --tb=short keeps each diagnosable.
        # The bring-up --maxfail bound was dropped once the lane went green
        # (1463 passed / 60 skipped on PostgreSQL).
        run: python -m pytest -q -ra --tb=short -p no:cacheprovider

  android:
    name: Android
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    env:
      # Inject the canonical owner server URL so BuildConfig.DEFAULT_SERVER_URL
      # is populated without keeping a hardcoded domain in build.gradle.kts.
      TICKETBOX_SERVER_URL: https://api.zen70.cn

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # ADR-0038 PR-Δ gate (assertAndroidTestCountEqualsBaseline) needs
          # ``git show <base_ref>:android/audit/test_count_baseline.txt`` to
          # read the base baseline for ratchet check. fetch-depth: 0 makes
          # the base ref reachable; without it the task FAILs in PR CI
          # rather than silently downgrading to strict-equality-only.
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # [codex round-7 followup] Force KSP to materially regenerate
      # the latest schema JSON on every CI run. Room's KSP processor
      # is incremental (room.incremental=true) and SKIPS overwriting
      # an existing schemaLocation file when its internal cache says
      # the entity hash is unchanged — including when the committed
      # file itself is wrong (e.g. a hand-written placeholder hash
      # that ships in a feature PR). Deleting the latest version's
      # file is the only reliable trigger for a fresh write. We
      # discover the highest version automatically so future v10/v11
      # additions don't have to update this step.
      - name: Force regenerate latest Room schema
        working-directory: .
        run: |
          set -euo pipefail
          schemaDir="android/app/schemas/com.ticketbox.data.local.AppDatabase"
          latest=$(ls "$schemaDir" | grep -E '^[0-9]+\.json$' | sort -n | tail -1)
          if [ -n "$latest" ]; then
            echo "Deleting $schemaDir/$latest to force KSP regeneration"
            rm -f "$schemaDir/$latest"
          fi

      - name: Test
        run: ./gradlew --no-daemon :app:testGrayDebugUnitTest

      - name: ADR-0038 PR-Δ — assert Android test count equals baseline
        # Three-layer policy (strict equality + UP ratchet vs base + bootstrap
        # by data shape). GITHUB_BASE_REF is set by GitHub Actions on PR
        # events; the gradle task uses ``git show <base_ref>:...`` to read
        # the base baseline file. fetch-depth: 0 on the Android checkout
        # is what makes ``origin/<base_ref>`` reachable; if missing, the
        # task FAILs loudly in PR CI rather than silently downgrading.
        run: ./gradlew --no-daemon :app:assertAndroidTestCountEqualsBaseline

      # [codex round-3 P2#3] Verify that committed Room schema
      # JSON matches what KSP just emitted from the @Database
      # entity definitions. If they differ, the developer
      # forgot to commit the regenerated `N.json` — fail loudly
      # so the schema diff lands in the same PR as the entity
      # change.
      - name: Verify Room schema snapshots are committed
        # [codex round-6 P1] The Android job runs with
        # working-directory: android, so a path like
        # ``android/app/schemas`` resolved to
        # ``android/android/app/schemas`` (does not exist), git
        # silently returned empty output and the gate "passed"
        # even when KSP had rewritten 9.json. Run from repo root.
        working-directory: .
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain android/app/schemas)" ]; then
            echo "::error::Room KSP regenerated schema files that aren't committed."
            echo "git status:"
            git status --porcelain android/app/schemas
            echo ""
            echo "Diff against HEAD (full, no truncation — schema files run ~300 lines):"
            git diff -- android/app/schemas
            echo ""
            echo "Untracked file content (git diff doesn't show new files):"
            git status --porcelain android/app/schemas | awk '/^\?\? /{print $2}' | while read -r f; do
              echo "--- $f"
              cat "$f"
              echo "--- end $f"
            done
            exit 1
          fi

      # [codex round-7 followup] Always upload the regenerated
      # schemas dir so the canonical baseline can be downloaded
      # from a failed run and committed back. Running on
      # ``always()`` (not just on failure) means a green-CI baseline
      # can also be archived for ad-hoc inspection.
      - name: Upload regenerated Room schemas
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: room-schemas-regenerated
          path: android/app/schemas/com.ticketbox.data.local.AppDatabase/
          if-no-files-found: error
          retention-days: 14

      - name: Build gray and internal debug APKs
        run: ./gradlew --no-daemon :app:assembleGrayDebug :app:assembleInternalDebug

      - name: Build gray and internal release APKs (R8)
        # Release builds run minify + shrinkResources. This keeps R8 keep
        # rules warm in CI instead of discovering Retrofit/Moshi issues only
        # when someone manually assembles a release.
        run: ./gradlew --no-daemon :app:assembleGrayRelease :app:assembleInternalRelease

      - name: Verify debug APK signing certificate
        run: |
          set -euo pipefail
          apksigner="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          expected="$(
            keytool -exportcert -rfc \
              -keystore config/debug/ticketbox-debug.keystore \
              -storepass ticketbox-debug \
              -alias ticketbox-debug |
            openssl x509 -noout -fingerprint -sha256 |
            awk -F= '{print $2}' |
            tr -d ':' |
            tr '[:upper:]' '[:lower:]'
          )"
          for apk in \
            app/build/outputs/apk/gray/debug/app-gray-debug.apk \
            app/build/outputs/apk/internal/debug/app-internal-debug.apk
          do
            actual="$("$apksigner" verify --print-certs "$apk" | awk -F': ' '/certificate SHA-256 digest/ {print $2; exit}' | tr -d ':' | tr '[:upper:]' '[:lower:]')"
            if [ "$actual" != "$expected" ]; then
              echo "Unexpected debug signing certificate for $apk"
              echo "Expected: $expected"
              echo "Actual:   $actual"
              exit 1
            fi
          done

      - name: Lint
        run: ./gradlew --no-daemon :app:lintGrayDebug

      - name: Dependency vulnerability scan (gradle dependency check)
        # v1.1 Batch 3: Android dependency vulnerability gate.
        # ``dependencyCheckAnalyze`` is wired through the OWASP plugin
        # (see android/build.gradle.kts). Any CVSS score >= 7.0 fails
        # the build; anything lower is reported but tolerated so a
        # transitive low-severity finding doesn't block a hotfix.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew --no-daemon dependencyCheckAnalyze -PnvdApiKey="${NVD_API_KEY}"
        continue-on-error: false

      - name: Upload gray debug APK
        uses: actions/upload-artifact@v7
        with:
          name: ticketbox-gray-debug-apk
          path: android/app/build/outputs/apk/gray/debug/app-gray-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload internal debug APK
        uses: actions/upload-artifact@v7
        with:
          name: ticketbox-internal-debug-apk
          path: android/app/build/outputs/apk/internal/debug/app-internal-debug.apk
          if-no-files-found: error
          retention-days: 7

# Instrumented (emulator) lane lives in .github/workflows/android-connected-test.yml:
# it has the right path filter (Android sources only), a 45-min timeout, and
# uses api-level 36 to match the SDK packages installed above. PR #81's
# duplicate job in this file (api 34, no timeout) was removed.
