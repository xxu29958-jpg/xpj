name: CI

# GitHub cloud CI — restored from the pre-Gitea original (deleted in d92c926d
# during the local-Gitea cut-over) and upgraded to the current PG-only codebase.
# This is the cloud counterpart of .gitea/workflows/windows-ci.yml; the
# _audit_ci_gap.py lane checks .github + .gitea jointly and requires .github/
# to exist, so both must carry the full REQUIRED task set. The original lived
# as ci.yml; the codex "cloud-ci.yml" rewrite dropped CodeQL, emulator KVM,
# fetch-depth:0 and concurrency — all restored here.

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"
      - "codex/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # ADR-0038 PR-Δ gate needs ``git show <base_ref>:...`` to read the
          # base baseline; shallow clone can't reach it and the gate FAILs in
          # PR CI rather than silently downgrading to strict-equality-only.
          fetch-depth: 0

      - name: Check PowerShell scripts
        working-directory: .
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\check_text_encoding.ps1
          powershell -ExecutionPolicy Bypass -File scripts\check_dependency_versions.ps1
          $roots = @("backend/scripts", "android/scripts", "scripts") | Where-Object { Test-Path $_ }
          $files = Get-ChildItem -Path $roots -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($file.FullName)
            $hasBom = $bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF
            if (-not $hasBom) {
              throw "$($file.FullName) must be UTF-8 with BOM for Windows PowerShell 5.1"
            }
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw -Encoding UTF8 -LiteralPath $file.FullName), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$($file.FullName) syntax error: $($errors[0].Message)"
            }
            Write-Host "OK $($file.FullName)"
          }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile
        run: python -m compileall app scripts tests

      - name: Lint
        run: ruff check app scripts tests

      - name: Audit (release lanes)
        # Single PR gate for every read-only audit (release_audit.py::LANES):
        # service-graph cycles, CI-gap whitelist, codebase smell report, etc.
        # Any lane returning non-zero fails the PR.
        env:
          XPJ_RELEASE_AUDIT_COMPACT: "1"
        run: python scripts\release_audit.py

      - name: API contract
        run: python scripts\check_api_contract.py

      # NOTE: the pytest suite AND the end-to-end smoke run on PostgreSQL in the
      # backend-postgres job below. SQLite (the old dev dialect) was retired in
      # the PG-only migration, so neither a bare pytest nor the threaded smoke
      # server can run here — this Windows job is static checks only.

      - name: Dependency vulnerability scan (pip-audit)
        # Fail the PR on any known-vulnerable Python dependency. ``--strict``
        # also fails on warnings (yanked package, etc.); ``--vulnerability-service
        # osv`` uses the public OSV database (no auth).
        env:
          PYTHONUTF8: "1"
        run: |
          python -m pip install pip-audit
          python -m pip_audit --strict --vulnerability-service osv -r requirements.txt -r requirements-dev.txt

  backend-postgres:
    name: Backend (PostgreSQL)
    # ADR-0041: production-bound PostgreSQL engine end-to-end. Linux runner
    # because GitHub Actions service containers (Postgres) only attach to Linux.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: backend
        shell: bash
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # CI speed-up: data dir on tmpfs (RAM). The PG suite is I/O-bound
        # (hundreds of MB of checkpoints/WAL under fsync); a RAM-backed data
        # dir makes those ~free. Safe — this DB is ephemeral per run.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install PostgreSQL 17 client
        # ubuntu-latest's default apt has no postgresql-client-17 (PG17 lives in
        # PGDG); pg_dump/pg_restore in the backup drill must match the PG17
        # service-container server. (codex first hit this on the live cloud run.)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          pg_dump --version
          pg_restore --version

      - name: Install dependencies
        run: |
          python -m venv .ci-venv
          ./.ci-venv/bin/python -m pip install --upgrade pip
          ./.ci-venv/bin/python -m pip install -r requirements-dev.txt

      - name: Create test databases
        env:
          PGPASSWORD: postgres
        run: |
          createdb -h localhost -p 5432 -U postgres xpj_smoke
          createdb -h localhost -p 5432 -U postgres xpj_test
          createdb -h localhost -p 5432 -U postgres xpj_restore

      - name: Verify PostgreSQL is reachable
        # Guard against a vacuous green: assert SMOKE_DATABASE_URL is Postgres
        # and connect, so a dropped/renamed var fails loud here instead of the
        # smoke silently falling back to a non-PG default.
        env:
          SMOKE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
        run: ./.ci-venv/bin/python -c "import os, psycopg; u = os.environ['SMOKE_DATABASE_URL']; assert u.startswith('postgresql'), u; psycopg.connect(u.replace('+psycopg','')).close(); print('PG reachable:', u.rsplit('@', 1)[-1])"

      - name: PostgreSQL end-to-end smoke (ADR-0041)
        env:
          SMOKE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
        run: ./.ci-venv/bin/python scripts/smoke_test.py

      - name: PostgreSQL backup/restore recovery drill (ADR-0041 phase-2)
        # ENGINEERING_RULES §6: a backup without a restore drill is no backup.
        # Dump smoke DB through the real backup code, validate the archive,
        # restore into a fresh DB, assert key tables round-tripped. Runs before
        # the pytest suite mutates xpj_smoke; uses its own xpj_restore.
        env:
          DRILL_SOURCE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
          DRILL_RESTORE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_restore
        run: ./.ci-venv/bin/python scripts/postgres_backup_drill.py

      - name: PostgreSQL pytest suite (ADR-0041)
        # Full suite against real PostgreSQL — the comprehensive dialect catch
        # the happy-path smoke can't reach. -ra summarises non-passing; --tb=short
        # keeps each diagnosable.
        env:
          XPJ_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_test
        run: ./.ci-venv/bin/python -m pytest -q -ra --tb=short -p no:cacheprovider

  desktop-manager:
    name: Desktop manager
    # The Windows tray/service manager (desktop/). Added after the original
    # ci.yml — pinned in _audit_ci_gap.py so the whole job can't silently vanish.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies
        run: |
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements.txt python-dotenv pytest ruff

      - name: Compile
        run: .\.ci-venv\Scripts\python.exe -m compileall backend_manager tests

      - name: Lint
        run: .\.ci-venv\Scripts\ruff.exe check backend_manager tests

      - name: Test
        run: .\.ci-venv\Scripts\python.exe -m pytest -q

  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: android
        shell: bash
    env:
      # Canonical owner server URL so BuildConfig.DEFAULT_SERVER_URL is populated
      # without a hardcoded domain in build.gradle.kts. Value comes from the repo
      # Actions variable (defense-in-depth: keep the origin host out of the public
      # workflow file — set it via `gh variable set TICKETBOX_SERVER_URL`).
      TICKETBOX_SERVER_URL: ${{ vars.TICKETBOX_SERVER_URL }}
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # assertAndroidTestCountEqualsBaseline reads the base baseline via
          # ``git show <base_ref>:android/audit/test_count_baseline.txt`` for the
          # ratchet check; fetch-depth: 0 makes the base ref reachable.
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Point Gradle at cloud Android SDK
        run: |
          sdk_dir="${ANDROID_HOME//\\/\\\\}"
          echo "sdk.dir=$sdk_dir" > local.properties
          echo "ticketbox.serverUrl=$TICKETBOX_SERVER_URL" >> local.properties

      - name: Tune Gradle for cloud runner
        run: |
          {
            echo ""
            echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
            echo "org.gradle.workers.max=2"
            echo "kotlin.daemon.jvmargs=-Xmx1536m"
          } >> gradle.properties

      - name: Gradle / JVM versions
        run: ./gradlew --no-daemon --version

      - name: Force regenerate latest Room schema
        # --rerun-tasks is the FROM-CACHE proofing that makes the schema-drift
        # gate non-vacuous: Room's KSP is incremental and SKIPS overwriting an
        # existing schema JSON when the entity hash is unchanged (even if the
        # committed file is a wrong placeholder). Deleting the latest version's
        # file + forcing KSP is the only reliable fresh-write trigger.
        run: |
          schema_dir="app/schemas/com.ticketbox.data.local.AppDatabase"
          latest="$(find "$schema_dir" -maxdepth 1 -name '*.json' -printf '%f\n' | sed 's/\.json$//' | grep -E '^[0-9]+$' | sort -n | tail -1 || true)"
          if [ -n "$latest" ]; then
            echo "Deleting $latest.json to force KSP regeneration"
            rm -f "$schema_dir/$latest.json"
          fi
          ./gradlew --no-daemon --max-workers=2 :app:kspGrayDebugKotlin --rerun-tasks

      - name: Compile and unit tests
        run: ./gradlew --no-daemon --max-workers=2 :app:compileGrayDebugKotlin :app:testGrayDebugUnitTest

      - name: Verify Room schema snapshots are committed
        # Run from repo root: with working-directory android a path like
        # ``android/app/schemas`` would resolve to ``android/android/...`` and
        # git would silently return empty (codex round-6 P1).
        working-directory: ${{ github.workspace }}
        run: |
          status="$(git status --porcelain android/app/schemas)"
          if [ -n "$status" ]; then
            echo "::error::Room KSP regenerated schema files that are not committed."
            echo "$status"
            git diff -- android/app/schemas
            exit 1
          fi
          echo "Room schema snapshots match the committed files"

      - name: Upload regenerated Room schemas
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: room-schemas-regenerated
          path: android/app/schemas/com.ticketbox.data.local.AppDatabase/
          if-no-files-found: error
          retention-days: 14

      - name: Android verification (count baseline + lint + detekt)
        # Kotlin complexity gate (CODE_QUALITY_STANDARDS.md): detekt 2.x runs
        # LongParameterList only under type resolution, so BOTH variant tasks
        # are pinned — the plain :app:detekt would be a weaker gate.
        run: ./gradlew --no-daemon --max-workers=2 :app:assertAndroidTestCountEqualsBaseline :app:lintGrayDebug :app:detektGrayDebug :app:detektGrayDebugUnitTest

      - name: Android debug APK builds
        run: ./gradlew --no-daemon --max-workers=2 :app:assembleGrayDebug :app:assembleInternalDebug

      - name: Android release APK builds
        # Release builds run R8 minify + shrinkResources, keeping keep-rules warm
        # in CI instead of discovering Retrofit/Moshi issues only on a manual
        # release assemble.
        run: ./gradlew --no-daemon --max-workers=2 :app:assembleGrayRelease :app:assembleInternalRelease

      - name: Verify debug APK signing certificate
        # Compute the expected fingerprint from the committed debug keystore
        # rather than hardcoding it, so a deliberate keystore rotation doesn't
        # need a CI edit while an accidental signing-identity change still fails.
        run: |
          set -euo pipefail
          apksigner="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          expected="$(
            keytool -exportcert -rfc \
              -keystore config/debug/ticketbox-debug.keystore \
              -storepass ticketbox-debug \
              -alias ticketbox-debug |
            openssl x509 -noout -fingerprint -sha256 |
            awk -F= '{print $2}' |
            tr -d ':' |
            tr '[:upper:]' '[:lower:]'
          )"
          for apk in \
            app/build/outputs/apk/gray/debug/app-gray-debug.apk \
            app/build/outputs/apk/internal/debug/app-internal-debug.apk
          do
            actual="$("$apksigner" verify --print-certs "$apk" | awk -F': ' '/certificate SHA-256 digest/ {print $2; exit}' | tr -d ':' | tr '[:upper:]' '[:lower:]')"
            if [ "$actual" != "$expected" ]; then
              echo "::error::Unexpected debug signing certificate for $apk - expected $expected got $actual"
              exit 1
            fi
            echo "OK signing certificate $apk"
          done

      - name: NVD cache key (UTC date)
        # Day-rotating key so the cached NVD DB refreshes ~daily; restore-keys
        # below falls back to the most recent prior cache on a key miss.
        id: nvd-key
        if: ${{ env.NVD_API_KEY != '' }}
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache OWASP NVD database
        # Persists the OWASP/NVD H2 DB across runs (path mirrors data.directory in
        # android/build.gradle.kts = Gradle user home). With nvd.validForHours=24 a
        # warm cache (<24h) makes the plugin SKIP the NVD API call entirely — the
        # whole point: kills the recurring NVD 520/524 gateway-timeout flake on
        # reruns/same-day runs and turns the full ~7min download into a cache hit.
        if: ${{ env.NVD_API_KEY != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: nvd-${{ runner.os }}-${{ steps.nvd-key.outputs.date }}
          restore-keys: |
            nvd-${{ runner.os }}-

      - name: Dependency vulnerability scan (OWASP dependency-check)
        if: ${{ env.NVD_API_KEY != '' }}
        id: owasp
        # Android dependency CVE gate via the OWASP plugin (android/build.gradle.kts).
        # Cloud-only (NVD download is too heavy for the single local-Gitea runner).
        # Requires the NVD_API_KEY repo secret.
        #
        # continue-on-error lets the run REACH the "Enforce" gate below even when
        # dependency-check exits non-zero — a cold NVD cache + NVD-source outage throws
        # a FATAL ExceptionCollection (gradle exit 1). This does NOT disable the gate:
        # the next step re-adjudicates the failure from the log so a real CVE finding
        # (failBuildOnCVSS, the docs/security/THREAT_MODEL.md gate) still reds the job;
        # only the specific NVD-data-unavailable path is tolerated, everything else
        # (corrupt DB, parser/analyzer fatals, unknown) fails safe. failOnError stays at
        # its default (true) so a corrupt cached DB can't silently skip analysis as a pass.
        continue-on-error: true
        run: |
          set +e            # capture the exit code manually; errexit would skip the lines below
          set -o pipefail
          # Bound the NVD download/scan so a slow or hung NVD source FAILS FAST instead of
          # hanging to the job's 40-min wall-clock limit — which cancels the job and SKIPS
          # the Enforce gate, leaving the Android job red with no adjudication. `-k 1m`
          # makes it a HARD bound: send TERM at 12m and, if a wedged JVM ignores/blocks it,
          # SIGKILL 1m later — so control always returns here (worst case ~13m, still under
          # timeout-minutes: 40 with the ~20m build).
          #
          # Timeout exit codes: 124 = TERM sent at the 12m deadline (only `timeout`
          # produces it → unambiguous timeout). 137 = SIGKILL, which is AMBIGUOUS: it's the
          # post-timeout `-k` KILL (tolerable) OR an OOM/external kill of a broken scanner
          # BEFORE the deadline (must NOT be tolerated). Disambiguate by elapsed time —
          # only a 137 at/after the 12m (720s) deadline is the post-timeout KILL; an earlier
          # 137 stays unmarked so the Enforce gate fails safe instead of treating a crashed
          # scanner as a tolerated timeout. The marker is what the Enforce gate tolerates.
          start=$(date +%s)
          timeout -k 1m 12m ./gradlew --no-daemon --max-workers=2 dependencyCheckAnalyze -PnvdApiKey="${NVD_API_KEY}" 2>&1 | tee owasp-output.log
          rc=${PIPESTATUS[0]}
          elapsed=$(( $(date +%s) - start ))
          if [ "$rc" -eq 124 ] || { [ "$rc" -eq 137 ] && [ "$elapsed" -ge 720 ]; }; then
            echo "OWASP_SCAN_TIMED_OUT_124 (dependency-check exceeded the 12m NVD bound; rc=$rc elapsed=${elapsed}s)" | tee -a owasp-output.log
          fi
          exit "$rc"

      - name: Enforce OWASP CVE findings (tolerate only NVD-data outages)
        if: ${{ env.NVD_API_KEY != '' }}
        # Re-asserts the dependency-check gate the previous step's continue-on-error
        # would otherwise drop. failOnError stays true, so outcome=success genuinely
        # means "analysis ran clean" (a corrupt-DB skip can't masquerade as success).
        # On failure, distinguish the two cases from the gradle log — report+CVSS check
        # run AFTER analysis, the fatal data error throws BEFORE:
        #   real finding       -> "...vulnerabilities that have a CVSS score greater than..."
        #   NVD data empty      -> "No documents exist" / "NoDataException" (Lucene CVE index empty)
        # Tolerate ONLY the NVD-data-empty signatures (NOT the generic "Analysis failed"
        # wrapper, which also fronts corrupt-DB / parser / analyzer fatals); fail-safe
        # (red) on a real finding and on every other / unrecognized failure so nothing
        # — a real CVE or a broken scanner — is silently swallowed.
        run: |
          if [ "${{ steps.owasp.outcome }}" = "success" ]; then
            echo "OWASP scan completed with no findings at/above the failBuildOnCVSS threshold."
            exit 0
          fi
          log=owasp-output.log
          if [ -f "$log" ] && grep -qiE "vulnerabilities that have a CVSS score greater than|failBuildOnCVSS" "$log"; then
            echo "::error::OWASP found a dependency at/above the failBuildOnCVSS threshold — real finding, failing the build (threat-model gate)."
            grep -iE "CVSS score greater than" "$log" || true
            exit 1
          fi
          if [ -f "$log" ] && grep -qiE "No documents exist|NoDataException" "$log"; then
            echo "::warning::OWASP dependency-check could not run: the NVD CVE data store is empty (cold cache + NVD source unreachable). Tolerated — no data to gate on."
            # Don't let a tolerated outage POISON the cache: dependency-check already
            # created an empty ~/.gradle/dependency-check-data H2 dir before throwing
            # NoDataException, and because the job now ends green the actions/cache step
            # would save that empty dir under today's key — same-day reruns would restore
            # it and keep short-circuiting to this tolerated path instead of rebuilding.
            # Delete it so the cache save has nothing to persist and the next run
            # re-attempts the NVD build (a good same-day cache, if one exists, is under an
            # already-saved immutable key and is unaffected).
            rm -rf "${HOME}/.gradle/dependency-check-data" || true
            echo "Removed the empty dependency-check data dir to avoid caching a poisoned NVD DB. Re-run once NVD is reachable to restore coverage."
            exit 0
          fi
          if [ -f "$log" ] && grep -q "OWASP_SCAN_TIMED_OUT_124" "$log"; then
            # The 12m bound covers the WHOLE task, so tolerate the timeout ONLY if it hit
            # the NVD update/fetch phase (the network-bound, flaky part) — i.e. analysis
            # never began. dependency-check logs "Analysis Started" once the NVD update
            # completes and the dependency-analysis loop begins; if that marker is present
            # the bound was hit DURING analysis/reporting (a non-NVD hang, even on a warm
            # cache) which could mask a real finding — fail safe rather than tolerate.
            # (a) If analysis began, the bound was hit during analysis/reporting (a non-NVD
            #     hang, even on a warm cache) which could mask a real finding — fail safe.
            if grep -qi "Analysis Started" "$log"; then
              echo "::error::OWASP hit the 12m bound AFTER analysis began (\"Analysis Started\" seen) — a hang in the dependency-analysis/reporting phase, not an NVD-fetch stall. Failing safe so a wedged scanner can't pass as a tolerated NVD timeout."
              exit 1
            fi
            # (b) Tolerate ONLY with POSITIVE evidence the stall was the NVD update/fetch (the
            #     network-bound, flaky part). A bound hit during gradle configuration /
            #     dependency resolution / lock wait — BEFORE dependency-check reaches NVD —
            #     also lacks "Analysis Started" yet is NOT an NVD outage, so require an
            #     NVD-update log signature; otherwise fail safe.
            # NVD-SPECIFIC markers only — NOT the generic "Checking for updates" banner,
            # which Engine.doUpdates logs before iterating EVERY cached datasource (RetireJS
            # / hosted-suppressions / KEV), so a stall in one of those (after the banner, no
            # "Analysis Started" yet) is not an NVD outage and must fail safe.
            if ! grep -qiE "NVD CVE|NVD API|Download Started for NVD|NVD data" "$log"; then
              echo "::error::OWASP hit the 12m bound without any NVD-specific update log (NVD CVE / NVD API / Download Started for NVD) — the stall was before NVD or in a non-NVD datasource (gradle config / dependency resolution / RetireJS / KEV), not a demonstrated NVD outage. Failing safe."
              exit 1
            fi
            echo "::warning::OWASP dependency-check hit the 12m bound DURING the NVD update/fetch phase (NVD-update log seen, analysis never started — slow/unreachable NVD source). Tolerated — nothing was analysed, so there are no findings to gate on; this keeps the job off the 40-min wall-clock cancel that used to skip this gate entirely."
            # A timed-out fetch leaves a PARTIAL H2 DB — same rationale as the data-empty
            # branch: drop it so an incomplete NVD DB isn't cached and the next run re-attempts
            # a full build instead of scanning with partial coverage.
            rm -rf "${HOME}/.gradle/dependency-check-data" || true
            exit 0
          fi
          echo "::error::OWASP step failed and the log is neither a CVE finding, a known NVD-data-empty outage, nor a scan timeout (could be a corrupt cache DB, parser/analyzer fatal, or unknown) — failing safe so no real finding is swallowed. See the previous step's log."
          exit 1

      - name: Dependency vulnerability scan skipped
        if: ${{ env.NVD_API_KEY == '' }}
        run: echo "::warning::NVD_API_KEY is not configured in GitHub Actions secrets; skipping OWASP dependency-check until the secret is restored."

      - name: Upload gray debug APK
        uses: actions/upload-artifact@v7
        with:
          name: ticketbox-gray-debug-apk
          path: android/app/build/outputs/apk/gray/debug/app-gray-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload internal debug APK
        uses: actions/upload-artifact@v7
        with:
          name: ticketbox-internal-debug-apk
          path: android/app/build/outputs/apk/internal/debug/app-internal-debug.apk
          if-no-files-found: error
          retention-days: 7

