name: Cloud CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-full:
    name: Backend full checks
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Tool versions
        run: |
          git --version
          python --version

      - name: Check PowerShell scripts
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\check_text_encoding.ps1
          powershell -ExecutionPolicy Bypass -File scripts\check_dependency_versions.ps1
          $roots = @("backend/scripts", "android/scripts", "scripts") | Where-Object { Test-Path $_ }
          $files = Get-ChildItem -Path $roots -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($file.FullName)
            $hasBom = $bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF
            if (-not $hasBom) {
              throw "$($file.FullName) must be UTF-8 with BOM for Windows PowerShell 5.1"
            }
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw -Encoding UTF8 -LiteralPath $file.FullName), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$($file.FullName) syntax error: $($errors[0].Message)"
            }
            Write-Host "OK $($file.FullName)"
          }

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Compile backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m compileall app scripts tests

      - name: Lint backend
        working-directory: backend
        run: .\.ci-venv\Scripts\ruff.exe check app scripts tests

      - name: API contract
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\check_api_contract.py

      - name: Release audit
        working-directory: backend
        env:
          XPJ_RELEASE_AUDIT_COMPACT: "1"
        run: .\.ci-venv\Scripts\python.exe scripts\release_audit.py

      - name: Dependency vulnerability scan
        working-directory: backend
        env:
          PYTHONUTF8: "1"
        run: |
          .\.ci-venv\Scripts\python.exe -m pip install pip-audit
          .\.ci-venv\Scripts\python.exe -m pip_audit --strict --vulnerability-service osv -r requirements.txt -r requirements-dev.txt

  backend-postgres:
    name: Backend (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          pg_dump --version
          pg_restore --version

      - name: Install backend dependencies
        run: |
          python -m venv .ci-venv
          ./.ci-venv/bin/python -m pip install --upgrade pip
          ./.ci-venv/bin/python -m pip install -r requirements-dev.txt

      - name: Create test databases
        env:
          PGPASSWORD: postgres
        run: |
          createdb -h localhost -p 5432 -U postgres xpj_smoke
          createdb -h localhost -p 5432 -U postgres xpj_test
          createdb -h localhost -p 5432 -U postgres xpj_restore

      - name: PostgreSQL reachability guard
        env:
          SMOKE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
        run: |
          ./.ci-venv/bin/python -c "import os, psycopg; u = os.environ['SMOKE_DATABASE_URL']; assert u.startswith('postgresql'), u; psycopg.connect(u.replace('+psycopg','')).close(); print('PG reachable:', u.rsplit('@', 1)[-1])"

      - name: PostgreSQL end-to-end smoke
        env:
          SMOKE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
        run: ./.ci-venv/bin/python scripts/smoke_test.py

      - name: PostgreSQL backup/restore drill
        env:
          DRILL_SOURCE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_smoke
          DRILL_RESTORE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_restore
        run: ./.ci-venv/bin/python scripts/postgres_backup_drill.py

      - name: PostgreSQL pytest suite
        env:
          XPJ_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/xpj_test
        run: ./.ci-venv/bin/python -m pytest -q -ra --tb=short -p no:cacheprovider

  desktop-manager:
    name: Desktop manager
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: desktop/requirements.txt

      - name: Install desktop dependencies
        run: |
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements.txt python-dotenv pytest ruff

      - name: Compile desktop manager
        run: .\.ci-venv\Scripts\python.exe -m compileall backend_manager tests

      - name: Lint desktop manager
        run: .\.ci-venv\Scripts\ruff.exe check backend_manager tests

      - name: Test desktop manager
        run: .\.ci-venv\Scripts\python.exe -m pytest -q

  android-unit:
    name: Android unit/build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: android
        shell: bash
    env:
      TICKETBOX_SERVER_URL: https://api.zen70.cn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK packages
        run: |
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager" ]; then
            sdkmanager="$(command -v sdkmanager)"
          fi
          "$sdkmanager" --version
          yes | "$sdkmanager" --licenses >/dev/null || true
          "$sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Point Gradle at cloud Android SDK
        run: |
          sdk_dir="${ANDROID_HOME//\\/\\\\}"
          echo "sdk.dir=$sdk_dir" > local.properties
          echo "ticketbox.serverUrl=$TICKETBOX_SERVER_URL" >> local.properties

      - name: Gradle / JVM versions
        run: ./gradlew --no-daemon --version

      - name: Force regenerate latest Room schema
        run: |
          schema_dir="app/schemas/com.ticketbox.data.local.AppDatabase"
          latest="$(find "$schema_dir" -maxdepth 1 -name '*.json' -printf '%f\n' | sed 's/\.json$//' | grep -E '^[0-9]+$' | sort -n | tail -1 || true)"
          if [ -n "$latest" ]; then
            echo "Deleting $latest.json to force KSP regeneration"
            rm -f "$schema_dir/$latest.json"
          fi
          ./gradlew --no-daemon :app:kspGrayDebugKotlin --rerun-tasks

      - name: Compile and unit tests
        run: ./gradlew --no-daemon :app:compileGrayDebugKotlin :app:testGrayDebugUnitTest

      - name: Verify Room schema snapshots are committed
        working-directory: ${{ github.workspace }}
        run: |
          status="$(git status --porcelain android/app/schemas)"
          if [ -n "$status" ]; then
            echo "::error::Room KSP regenerated schema files that are not committed."
            echo "$status"
            git diff -- android/app/schemas
            exit 1
          fi
          echo "Room schema snapshots match the committed files"

      - name: Android verification and APK builds
        run: ./gradlew --no-daemon :app:assertAndroidTestCountEqualsBaseline :app:lintGrayDebug :app:detektGrayDebug :app:detektGrayDebugUnitTest :app:assembleGrayDebug :app:assembleInternalDebug :app:assembleGrayRelease :app:assembleInternalRelease

      - name: Verify debug APK signing certificate
        run: |
          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)"
          if [ -z "$apksigner" ]; then
            echo "::error::apksigner not found under $ANDROID_HOME/build-tools"
            exit 1
          fi
          expected="911522417cc5016edadcffadde7b904d928dc42d66a797844445acb5bcae106f"
          for apk in \
            "app/build/outputs/apk/gray/debug/app-gray-debug.apk" \
            "app/build/outputs/apk/internal/debug/app-internal-debug.apk"
          do
            line="$("$apksigner" verify --print-certs "$apk" | grep "certificate SHA-256 digest" | head -1)"
            actual="$(printf '%s' "$line" | sed -E 's/.*digest: //' | tr -d ':' | tr '[:upper:]' '[:lower:]')"
            if [ "$actual" != "$expected" ]; then
              echo "::error::Unexpected debug signing certificate for $apk - expected $expected got $actual"
              exit 1
            fi
            echo "OK signing certificate $apk"
          done
