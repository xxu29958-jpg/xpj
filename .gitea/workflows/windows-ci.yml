name: Windows CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"
  workflow_dispatch:

jobs:
  backend-basic:
    name: Backend basic checks
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tool versions
        run: |
          git --version
          python --version

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Compile backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m compileall app scripts tests

      - name: Lint backend
        working-directory: backend
        run: .\.ci-venv\Scripts\ruff.exe check app scripts tests

      - name: Test backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m pytest -q

      - name: API contract (OpenAPI snapshot in sync)
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\check_api_contract.py

      - name: Release audit (19 read-only lanes)
        # Single gate for every audit in scripts/release_audit.py::LANES —
        # dispatcher coverage, token parity, mutate-token coverage, pr-delta
        # count, dialect convergence, etc. On a push event (no base ref) the
        # pr-delta lane runs strict-equality vs the committed baseline.
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\release_audit.py

  android-unit:
    name: Android unit
    runs-on: windows-latest

    defaults:
      run:
        working-directory: android
        shell: powershell

    env:
      # Mirrors ci.yml: populates BuildConfig.DEFAULT_SERVER_URL without
      # hardcoding the domain in build.gradle.kts.
      TICKETBOX_SERVER_URL: https://api.zen70.cn

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # assertAndroidTestCountEqualsBaseline reads the base baseline via
          # git on PR events; full history keeps that reachable. On push it
          # degrades to strict-equality vs the committed baseline file.
          fetch-depth: 0

      - name: Point gradle at the Android SDK (self-hosted runner)
        # The runner's fresh checkout has no git-ignored local.properties.
        # Prefer the runner's ANDROID_HOME if it ever gets one; else fall back to
        # this box's project-local toolchain SDK — that's what local dev builds
        # against (the global ~/AppData SDK is missing build-tools). Update the
        # fallback path on a new machine / the future Mac Mini.
        run: |
          $sdk = if ($env:ANDROID_HOME) { $env:ANDROID_HOME } else { "E:/projects/xiaopiaojia/.toolchains/android-sdk" }
          $sdkEscaped = ($sdk -replace '\\','/') -replace ':','\:'
          Set-Content -Path local.properties -Value "sdk.dir=$sdkEscaped" -Encoding ascii
          Get-Content local.properties

      - name: Gradle / JVM versions
        run: .\gradlew.bat --no-daemon --version

      - name: Compile + unit tests
        run: .\gradlew.bat --no-daemon :app:compileGrayDebugKotlin :app:testGrayDebugUnitTest

      - name: Assert test count equals baseline
        run: .\gradlew.bat --no-daemon :app:assertAndroidTestCountEqualsBaseline

      - name: Lint
        run: .\gradlew.bat --no-daemon :app:lintGrayDebug

      - name: Assemble gray debug APK
        run: .\gradlew.bat --no-daemon :app:assembleGrayDebug
