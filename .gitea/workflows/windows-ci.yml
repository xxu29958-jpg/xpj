name: Windows CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"
  workflow_dispatch:

jobs:
  backend-full:
    name: Backend full checks
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tool versions
        run: |
          git --version
          python --version

      - name: Check PowerShell scripts
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\check_text_encoding.ps1
          powershell -ExecutionPolicy Bypass -File scripts\check_dependency_versions.ps1
          $roots = @("backend/scripts", "android/scripts", "scripts") | Where-Object { Test-Path $_ }
          $files = Get-ChildItem -Path $roots -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($file.FullName)
            $hasBom = $bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF
            if (-not $hasBom) {
              throw "$($file.FullName) must be UTF-8 with BOM for Windows PowerShell 5.1"
            }
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw -Encoding UTF8 -LiteralPath $file.FullName), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$($file.FullName) syntax error: $($errors[0].Message)"
            }
            Write-Host "OK $($file.FullName)"
          }

      - name: Install backend dependencies
        working-directory: backend
        run: |
          if (Test-Path .ci-venv) { Remove-Item -Recurse -Force .ci-venv }
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Compile backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m compileall app scripts tests

      - name: Lint backend
        working-directory: backend
        run: .\.ci-venv\Scripts\ruff.exe check app scripts tests

      - name: Test backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m pytest --cov=app --cov-report=term-missing

      - name: API contract
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\check_api_contract.py

      - name: Test file-backed SQLite lane
        working-directory: backend
        env:
          XPJ_TEST_FILE_BACKED: "1"
        run: .\.ci-venv\Scripts\python.exe -m pytest -q -m file_backed_only

      - name: Smoke test
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\smoke_test.py

      - name: Release audit
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\release_audit.py

      - name: Dependency vulnerability scan
        working-directory: backend
        env:
          PYTHONUTF8: "1"
        run: |
          .\.ci-venv\Scripts\python.exe -m pip install pip-audit
          .\.ci-venv\Scripts\python.exe -m pip_audit --strict --vulnerability-service osv -r requirements.txt -r requirements-dev.txt

  desktop-manager:
    name: Desktop manager
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install desktop dependencies
        run: |
          if (Test-Path .ci-venv) { Remove-Item -Recurse -Force .ci-venv }
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements.txt python-dotenv pytest ruff

      - name: Compile desktop manager
        run: .\.ci-venv\Scripts\python.exe -m compileall backend_manager tests

      - name: Lint desktop manager
        run: .\.ci-venv\Scripts\ruff.exe check backend_manager tests

      - name: Test desktop manager
        run: .\.ci-venv\Scripts\python.exe -m pytest -q

  android-unit:
    name: Android unit/build
    runs-on: windows-latest

    defaults:
      run:
        working-directory: android
        shell: powershell

    env:
      TICKETBOX_SERVER_URL: https://api.zen70.cn
      ANDROID_HOME: E:\projects\xiaopiaojia\.toolchains\android-sdk
      ANDROID_SDK_ROOT: E:\projects\xiaopiaojia\.toolchains\android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Point Gradle at local Android SDK
        run: |
          if (-not (Test-Path $env:ANDROID_HOME)) {
            throw "Android SDK not found: $env:ANDROID_HOME"
          }
          "sdk.dir=E\:/projects/xiaopiaojia/.toolchains/android-sdk" | Set-Content -Encoding ASCII -Path local.properties
          "ticketbox.serverUrl=$env:TICKETBOX_SERVER_URL" | Add-Content -Encoding ASCII -Path local.properties

      - name: Gradle / JVM versions
        run: .\gradlew.bat --no-daemon --version

      - name: Compile and unit tests
        run: .\gradlew.bat --no-daemon :app:compileGrayDebugKotlin :app:testGrayDebugUnitTest

      - name: Assert test count equals baseline
        run: .\gradlew.bat --no-daemon :app:assertAndroidTestCountEqualsBaseline

      - name: Lint
        run: .\gradlew.bat --no-daemon :app:lintGrayDebug

      - name: Assemble gray debug APK
        run: .\gradlew.bat --no-daemon :app:assembleGrayDebug

      - name: Assemble internal debug APK
        run: .\gradlew.bat --no-daemon :app:assembleInternalDebug
