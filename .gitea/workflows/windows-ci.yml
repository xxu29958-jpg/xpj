name: Windows CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"
  workflow_dispatch:

jobs:
  backend-basic:
    name: Backend basic checks
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tool versions
        run: |
          git --version
          python --version

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Compile backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m compileall app scripts tests

      - name: Lint backend
        working-directory: backend
        run: .\.ci-venv\Scripts\ruff.exe check app scripts tests

      - name: Test backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m pytest -q
