name: Windows CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"
  workflow_dispatch:

jobs:
  backend-full:
    name: Backend full checks
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout (offline — local Gitea, no github.com)
        working-directory: ${{ github.workspace }}
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          $ws = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          Get-ChildItem -LiteralPath $ws -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          git init -q $ws
          if ($LASTEXITCODE -ne 0) { throw "git init failed" }
          $server = $env:GITHUB_SERVER_URL.TrimEnd('/')
          $origin = "$server/$env:GITHUB_REPOSITORY.git"
          if (@(git -C $ws remote) -contains "origin") {
            git -C $ws remote set-url origin $origin
          } else {
            git -C $ws remote add origin $origin
          }
          if ($LASTEXITCODE -ne 0) { throw "git remote setup failed" }
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:REPO_TOKEN"))
          git -C $ws -c "http.extraheader=AUTHORIZATION: basic $b64" -c protocol.version=2 fetch -q --prune --no-recurse-submodules origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "git fetch from local Gitea failed" }
          git -C $ws checkout -q -f $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "git checkout $env:GITHUB_SHA failed" }
          git -C $ws log --oneline -1

      - name: Tool versions
        run: |
          git --version
          python --version

      - name: Check PowerShell scripts
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\check_text_encoding.ps1
          powershell -ExecutionPolicy Bypass -File scripts\check_dependency_versions.ps1
          $roots = @("backend/scripts", "android/scripts", "scripts") | Where-Object { Test-Path $_ }
          $files = Get-ChildItem -Path $roots -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($file.FullName)
            $hasBom = $bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF
            if (-not $hasBom) {
              throw "$($file.FullName) must be UTF-8 with BOM for Windows PowerShell 5.1"
            }
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw -Encoding UTF8 -LiteralPath $file.FullName), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$($file.FullName) syntax error: $($errors[0].Message)"
            }
            Write-Host "OK $($file.FullName)"
          }

      - name: Install backend dependencies
        working-directory: backend
        run: |
          if (Test-Path .ci-venv) { Remove-Item -Recurse -Force .ci-venv }
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Compile backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m compileall app scripts tests

      - name: Lint backend
        working-directory: backend
        run: .\.ci-venv\Scripts\ruff.exe check app scripts tests

      # The full pytest suite AND the end-to-end smoke run on PostgreSQL in the
      # backend-postgres job below (PG-only — debt #4): the SQLite engine is
      # retired, so neither a bare `pytest` nor the threaded smoke server can run
      # here without a cluster, which this job has none of. backend-full keeps
      # the static checks only.

      - name: API contract
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\check_api_contract.py

      - name: Release audit
        working-directory: backend
        env:
          XPJ_RELEASE_AUDIT_COMPACT: "1"
        run: .\.ci-venv\Scripts\python.exe scripts\release_audit.py

      - name: Dependency vulnerability scan
        working-directory: backend
        env:
          PYTHONUTF8: "1"
        run: |
          .\.ci-venv\Scripts\python.exe -m pip install pip-audit
          .\.ci-venv\Scripts\python.exe -m pip_audit --strict --vulnerability-service osv -r requirements.txt -r requirements-dev.txt

  backend-postgres:
    name: Backend (PostgreSQL)
    # PG-only (debt #4): PostgreSQL is the only engine, so this lane runs the
    # full pytest suite + the end-to-end smoke on it; backend-full above runs
    # static checks only (no DB server). The original lane was
    # .github/workflows/ci.yml on a Linux runner with a
    # postgres service container — dead since the GitHub→Gitea move. The gitea
    # runner is Windows + no Docker, so we spin an ephemeral PostgreSQL via the
    # locally-installed initdb (PG 17 on the home-server runner) on port 5433, so
    # it never touches the prod cluster on 5432. The cluster is started, used and
    # stopped inside a single step's try/finally (see the WaitDelay note below).
    runs-on: windows-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: backend
        shell: powershell

    steps:
      - name: Checkout (offline — local Gitea, no github.com)
        working-directory: ${{ github.workspace }}
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          $ws = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          Get-ChildItem -LiteralPath $ws -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          git init -q $ws
          if ($LASTEXITCODE -ne 0) { throw "git init failed" }
          $server = $env:GITHUB_SERVER_URL.TrimEnd('/')
          $origin = "$server/$env:GITHUB_REPOSITORY.git"
          if (@(git -C $ws remote) -contains "origin") {
            git -C $ws remote set-url origin $origin
          } else {
            git -C $ws remote add origin $origin
          }
          if ($LASTEXITCODE -ne 0) { throw "git remote setup failed" }
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:REPO_TOKEN"))
          git -C $ws -c "http.extraheader=AUTHORIZATION: basic $b64" -c protocol.version=2 fetch -q --prune --no-recurse-submodules origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "git fetch from local Gitea failed" }
          git -C $ws checkout -q -f $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "git checkout $env:GITHUB_SHA failed" }
          git -C $ws log --oneline -1

      - name: Install backend dependencies
        run: |
          if (Test-Path .ci-venv) { Remove-Item -Recurse -Force .ci-venv }
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: PostgreSQL lane — ephemeral cluster + smoke + suite
        # initdb spins a throwaway PG (PG 17 on the runner) on :5433, isolated
        # from the prod cluster on :5432. start + smoke + suite + stop run in ONE
        # step with the stop in a finally on purpose: the postmaster is a
        # long-lived child that inherits this step's stdio, and the gitea runner
        # post-step I/O drain waits for that handle to close — if the postmaster
        # is still alive at step exit the drain fails with "WaitDelay expired
        # before I/O complete" (the first red run). Stopping it inside the
        # finally guarantees it is gone before the PowerShell exits. xpj_test
        # (suite) is separate from xpj_smoke so the smoke's rows never collide.
        run: |
          # Numeric version sort: a lingering 9.x client must not beat 17 by string order ("9" > "1").
          $pgctl = Get-ChildItem 'C:\Program Files\PostgreSQL\*\bin\pg_ctl.exe' -ErrorAction SilentlyContinue | Sort-Object { $v = 0.0; if ([double]::TryParse($_.Directory.Parent.Name, [System.Globalization.NumberStyles]::Float, [System.Globalization.CultureInfo]::InvariantCulture, [ref]$v)) { $v } else { -1.0 } } -Descending | Select-Object -First 1
          if (-not $pgctl) { throw "PostgreSQL not installed on runner (expected C:\Program Files\PostgreSQL\<ver>\bin)" }
          $pgbin = $pgctl.DirectoryName
          $runid = if ($env:GITHUB_RUN_ID) { $env:GITHUB_RUN_ID } else { 'local' }
          $datadir = Join-Path $env:TEMP "xpj_pg_ci_$runid"
          if (Test-Path $datadir) { Remove-Item -Recurse -Force $datadir }
          $pmpid = $null
          $failed = $false
          try {
            & "$pgbin\initdb.exe" -D $datadir -U postgres --auth=trust -E UTF8 --locale=C | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "initdb failed" }
            & "$pgbin\pg_ctl.exe" -D $datadir -o "-p 5433 -c listen_addresses=localhost" -l "$datadir\server.log" -w start
            if ($LASTEXITCODE -ne 0) { if (Test-Path "$datadir\server.log") { Get-Content "$datadir\server.log" }; throw "pg_ctl start failed" }
            $pmpid = (Get-Content (Join-Path $datadir "postmaster.pid") -TotalCount 1 -ErrorAction SilentlyContinue)
            & "$pgbin\createdb.exe" -h localhost -p 5433 -U postgres xpj_smoke
            if ($LASTEXITCODE -ne 0) { throw "createdb xpj_smoke failed" }
            & "$pgbin\createdb.exe" -h localhost -p 5433 -U postgres xpj_test
            if ($LASTEXITCODE -ne 0) { throw "createdb xpj_test failed" }
            & "$pgbin\createdb.exe" -h localhost -p 5433 -U postgres xpj_restore
            if ($LASTEXITCODE -ne 0) { throw "createdb xpj_restore failed" }
            Write-Host "ephemeral PostgreSQL up on 127.0.0.1:5433 (xpj_smoke + xpj_test + xpj_restore)"

            # Reachability guard: fail loud if the URL ever silently falls back to SQLite.
            $env:SMOKE_DATABASE_URL = "postgresql+psycopg://postgres@localhost:5433/xpj_smoke"
            .\.ci-venv\Scripts\python.exe -c "import os, psycopg; u = os.environ['SMOKE_DATABASE_URL']; assert u.startswith('postgresql'), u; psycopg.connect(u.replace('+psycopg','')).close(); print('PG reachable:', u.rsplit('@',1)[-1])"
            if ($LASTEXITCODE -ne 0) { throw "PG reachability guard failed" }

            # End-to-end smoke: bootstrap -> upload -> OCC-token confirm against real
            # PG. Proves create_all + Alembic replay (incl. 20260606_0001) works on
            # the PostgreSQL engine.
            Write-Host "--- PostgreSQL end-to-end smoke ---"
            .\.ci-venv\Scripts\python.exe scripts\smoke_test.py
            if ($LASTEXITCODE -ne 0) { throw "PostgreSQL smoke failed" }

            # Backup/restore recovery drill (ENGINEERING_RULES section 6: a backup
            # without a restore drill is no backup). Dumps the smoke-populated DB
            # through the real backend backup code (pg_dump -Fc via find_pg_binary),
            # validates the archive, restores into the fresh xpj_restore DB and
            # asserts identical row counts. Lived on the GitHub-era PG lane, lost
            # in the Gitea move, revived here. Runs before the pytest suite
            # mutates anything; pg_restore resolves via the same Program Files
            # glob as pg_dump (not on the runner's PATH).
            Write-Host "--- PostgreSQL backup/restore drill ---"
            $env:DRILL_SOURCE_URL = "postgresql+psycopg://postgres@localhost:5433/xpj_smoke"
            $env:DRILL_RESTORE_URL = "postgresql+psycopg://postgres@localhost:5433/xpj_restore"
            .\.ci-venv\Scripts\python.exe scripts\postgres_backup_drill.py
            if ($LASTEXITCODE -ne 0) { throw "PostgreSQL backup/restore drill failed" }

            # Full suite on real PG — the only engine now (debt #4). Own xpj_test
            # DB (separate from xpj_smoke) so the smoke's rows never collide.
            Write-Host "--- PostgreSQL pytest suite ---"
            $env:XPJ_TEST_DATABASE_URL = "postgresql+psycopg://postgres@localhost:5433/xpj_test"
            .\.ci-venv\Scripts\python.exe -m pytest -q -ra --tb=short -p no:cacheprovider
            if ($LASTEXITCODE -ne 0) { throw "PostgreSQL pytest suite failed" }
          }
          catch {
            $failed = $true
            Write-Host "##[error]PostgreSQL lane failed: $_"
          }
          finally {
            # Teardown MUST leave no live postgres (else the runner's post-step I/O
            # drain hits "WaitDelay expired") and MUST NOT fail the step on its own
            # hiccups. pg_ctl stop -m fast hung 60s on Windows (run 28), so force-kill
            # the ephemeral cluster's OWN process tree by its postmaster PID. NEVER
            # kill by binary path — the prod PG on :5432 shares these binaries.
            if ($pmpid) { & taskkill /F /T /PID $pmpid | Out-Null }
            if (Test-Path $datadir) { Remove-Item -Recurse -Force $datadir -ErrorAction SilentlyContinue }
            $global:LASTEXITCODE = 0
            Write-Host "ephemeral PostgreSQL torn down"
          }
          if ($failed) { exit 1 } else { exit 0 }

      - name: Stop ephemeral PostgreSQL (backstop)
        if: always()
        # The lane step's finally already stops PG on the normal + failure paths
        # (required so the postmaster is gone before that step's I/O drain). This
        # only cleans up after an abnormal kill (e.g. job timeout) that skipped
        # the finally — it never runs the WaitDelay-prevention path.
        run: |
          $runid = if ($env:GITHUB_RUN_ID) { $env:GITHUB_RUN_ID } else { 'local' }
          $datadir = Join-Path $env:TEMP "xpj_pg_ci_$runid"
          $pidfile = Join-Path $datadir "postmaster.pid"
          if (Test-Path $pidfile) {
            $pmpid = (Get-Content $pidfile -TotalCount 1 -ErrorAction SilentlyContinue)
            if ($pmpid) { & taskkill /F /T /PID $pmpid | Out-Null }
          }
          if (Test-Path $datadir) { Remove-Item -Recurse -Force $datadir -ErrorAction SilentlyContinue }
          $global:LASTEXITCODE = 0

  desktop-manager:
    name: Desktop manager
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop
        shell: powershell

    steps:
      - name: Checkout (offline — local Gitea, no github.com)
        working-directory: ${{ github.workspace }}
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          $ws = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          Get-ChildItem -LiteralPath $ws -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          git init -q $ws
          if ($LASTEXITCODE -ne 0) { throw "git init failed" }
          $server = $env:GITHUB_SERVER_URL.TrimEnd('/')
          $origin = "$server/$env:GITHUB_REPOSITORY.git"
          if (@(git -C $ws remote) -contains "origin") {
            git -C $ws remote set-url origin $origin
          } else {
            git -C $ws remote add origin $origin
          }
          if ($LASTEXITCODE -ne 0) { throw "git remote setup failed" }
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:REPO_TOKEN"))
          git -C $ws -c "http.extraheader=AUTHORIZATION: basic $b64" -c protocol.version=2 fetch -q --prune --no-recurse-submodules origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "git fetch from local Gitea failed" }
          git -C $ws checkout -q -f $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "git checkout $env:GITHUB_SHA failed" }
          git -C $ws log --oneline -1

      - name: Install desktop dependencies
        run: |
          if (Test-Path .ci-venv) { Remove-Item -Recurse -Force .ci-venv }
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements.txt python-dotenv pytest ruff

      - name: Compile desktop manager
        run: .\.ci-venv\Scripts\python.exe -m compileall backend_manager tests

      - name: Lint desktop manager
        run: .\.ci-venv\Scripts\ruff.exe check backend_manager tests

      - name: Test desktop manager
        run: .\.ci-venv\Scripts\python.exe -m pytest -q

  android-unit:
    name: Android unit/build
    runs-on: windows-latest
    # The single serial runner serves every job: without a ceiling, one
    # wedged R8/KSP build would block all CI for act_runner's ~3h default.
    timeout-minutes: 40

    defaults:
      run:
        working-directory: android
        shell: powershell

    env:
      # From the gitea Actions variable — set it in the gitea repo/org Actions
      # variables (Settings → Actions → Variables) before the next gitea CI run.
      TICKETBOX_SERVER_URL: ${{ vars.TICKETBOX_SERVER_URL }}
      ANDROID_HOME: E:\projects\xiaopiaojia\.toolchains\android-sdk
      ANDROID_SDK_ROOT: E:\projects\xiaopiaojia\.toolchains\android-sdk

    steps:
      - name: Checkout (offline — local Gitea, no github.com)
        working-directory: ${{ github.workspace }}
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          $ws = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          Get-ChildItem -LiteralPath $ws -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          git init -q $ws
          if ($LASTEXITCODE -ne 0) { throw "git init failed" }
          $server = $env:GITHUB_SERVER_URL.TrimEnd('/')
          $origin = "$server/$env:GITHUB_REPOSITORY.git"
          if (@(git -C $ws remote) -contains "origin") {
            git -C $ws remote set-url origin $origin
          } else {
            git -C $ws remote add origin $origin
          }
          if ($LASTEXITCODE -ne 0) { throw "git remote setup failed" }
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:REPO_TOKEN"))
          git -C $ws -c "http.extraheader=AUTHORIZATION: basic $b64" -c protocol.version=2 fetch -q --prune --no-recurse-submodules origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "git fetch from local Gitea failed" }
          git -C $ws checkout -q -f $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "git checkout $env:GITHUB_SHA failed" }
          git -C $ws log --oneline -1

      - name: Point Gradle at local Android SDK
        run: |
          if (-not (Test-Path $env:ANDROID_HOME)) {
            throw "Android SDK not found: $env:ANDROID_HOME"
          }
          "sdk.dir=E\:/projects/xiaopiaojia/.toolchains/android-sdk" | Set-Content -Encoding ASCII -Path local.properties
          "ticketbox.serverUrl=$env:TICKETBOX_SERVER_URL" | Add-Content -Encoding ASCII -Path local.properties

      - name: Gradle / JVM versions
        run: .\gradlew.bat --no-daemon --version

      - name: Force regenerate latest Room schema
        # Room's KSP processor is incremental and SKIPS rewriting an existing
        # schemaLocation file when its cache says the entity hash is unchanged
        # — including when the committed file itself is wrong. Deleting the
        # latest version's file turns a silent skip into a loud diff. The
        # delete alone is NOT enough: app/schemas is a legacy KSP arg, not a
        # declared task output, so a FROM-CACHE kspGrayDebugKotlin hit (shared
        # build cache, org.gradle.caching=true) never re-runs the processor
        # and the deleted file stays gone — hence the explicit --rerun-tasks
        # KSP invocation here. The later compile step then sees KSP UP-TO-DATE
        # (net cost ≈ zero). (GitHub-era step, revived + cache-proofed.)
        run: |
          $schemaDir = "app\schemas\com.ticketbox.data.local.AppDatabase"
          $latest = Get-ChildItem $schemaDir -Filter "*.json" |
            Where-Object { $_.BaseName -match '^\d+$' } |
            Sort-Object { [int]$_.BaseName } |
            Select-Object -Last 1
          if ($latest) {
            Write-Host "Deleting $($latest.Name) to force KSP regeneration"
            Remove-Item -LiteralPath $latest.FullName -Force
          }
          .\gradlew.bat --no-daemon :app:kspGrayDebugKotlin --rerun-tasks

      - name: Compile and unit tests
        run: .\gradlew.bat --no-daemon :app:compileGrayDebugKotlin :app:testGrayDebugUnitTest

      - name: Verify Room schema snapshots are committed
        # The regen step above just force-re-emitted the latest schema JSON;
        # if it differs from the committed file the entity change shipped
        # without its schema diff — fail loudly with the patch. Runs from the
        # repo root: with working-directory android, the android/app/schemas
        # pathspec silently matches nothing and the gate "passes" (the
        # GitHub-era lane shipped exactly that bug once).
        working-directory: ${{ github.workspace }}
        run: |
          $status = git status --porcelain android/app/schemas
          if ($status) {
            Write-Host "##[error]Room KSP regenerated schema files that aren't committed."
            Write-Host "git status:"
            Write-Host ($status -join "`n")
            Write-Host "Diff against HEAD:"
            git diff -- android/app/schemas
            $untracked = @($status | Where-Object { $_ -match '^\?\? ' } | ForEach-Object { ($_ -replace '^\?\? ', '').Trim() })
            foreach ($f in $untracked) {
              Write-Host "--- $f"
              Get-Content -LiteralPath $f -Encoding UTF8
              Write-Host "--- end $f"
            }
            throw "Room schema drift — commit the regenerated JSON in the same PR as the entity change"
          }
          Write-Host "Room schema snapshots match the committed files"

      - name: Android verification and APK builds
        # Keep the same required Gradle gates, but run them in one invocation
        # after the Room schema drift check. On the single Windows runner this
        # avoids paying Gradle configuration + single-use daemon startup six
        # separate times while preserving the same fail-fast behavior.
        #
        # Detekt remains type-resolving (both grayDebug variants), and release
        # builds still run R8 minify + shrinkResources. Unsigned release APKs
        # are expected in CI because the release signingConfig is optional.
        run: .\gradlew.bat --no-daemon :app:assertAndroidTestCountEqualsBaseline :app:lintGrayDebug :app:detektGrayDebug :app:detektGrayDebugUnitTest :app:assembleGrayDebug :app:assembleInternalDebug :app:assembleGrayRelease :app:assembleInternalRelease

      - name: Verify debug APK signing certificate
        # Both debug APKs must carry the repository-level stable debug
        # certificate (android/config/debug/ticketbox-debug.keystore) so a
        # CI-built APK can adb install -r over any existing debug install.
        # Expected fingerprint pinned from android/config/debug/README.md —
        # if the keystore is ever rotated, update both together.
        run: |
          # Under the runner's $ErrorActionPreference = 'Stop', the 2>&1
          # below would turn the FIRST stderr line apksigner/java ever emits
          # (e.g. a JAVA_OPTIONS notice) into a terminating error before
          # $LASTEXITCODE is consulted. This step's failure handling is
          # entirely explicit (throw + exit-code checks), so relax EAP here.
          $ErrorActionPreference = 'Continue'
          $apksigner = Get-ChildItem "$env:ANDROID_HOME\build-tools\*\apksigner.bat" -ErrorAction SilentlyContinue |
            Sort-Object { [version]$_.Directory.Name } -Descending | Select-Object -First 1
          if (-not $apksigner) { throw "apksigner.bat not found under $env:ANDROID_HOME\build-tools" }
          $expected = "911522417cc5016edadcffadde7b904d928dc42d66a797844445acb5bcae106f"
          $apks = @(
            "app\build\outputs\apk\gray\debug\app-gray-debug.apk",
            "app\build\outputs\apk\internal\debug\app-internal-debug.apk"
          )
          foreach ($apk in $apks) {
            # Capture the FULL output before filtering. Piping the .bat
            # straight into Select-Object -First 1 severs the native pipe as
            # soon as the digest line arrives; java then dies writing the
            # remaining cert lines and the .bat exits 1, which the runner
            # epilogue propagates as a step failure AFTER both OKs printed
            # (the first red run failed exactly that way). Capturing also
            # lets us check apksigner's real exit code.
            $out = & $apksigner.FullName verify --print-certs $apk 2>&1
            if ($LASTEXITCODE -ne 0) {
              $out | ForEach-Object { Write-Host $_ }
              throw "apksigner verify failed for $apk (exit $LASTEXITCODE)"
            }
            $line = $out | Select-String -Pattern "certificate SHA-256 digest" | Select-Object -First 1
            if (-not $line) { throw "no SHA-256 digest line from apksigner for $apk" }
            $actual = ($line.Line -split ":\s*", 2)[1].Trim().Replace(":", "").ToLowerInvariant()
            if ($actual -ne $expected) {
              throw "Unexpected debug signing certificate for $apk - expected $expected got $actual"
            }
            Write-Host "OK signing certificate $apk"
          }
          exit 0
