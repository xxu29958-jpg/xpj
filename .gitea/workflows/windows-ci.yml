name: Windows CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"
  workflow_dispatch:

jobs:
  backend-full:
    name: Backend full checks
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout (offline — local Gitea, no github.com)
        working-directory: ${{ github.workspace }}
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          $ws = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          Get-ChildItem -LiteralPath $ws -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          git init -q $ws
          if ($LASTEXITCODE -ne 0) { throw "git init failed" }
          $server = $env:GITHUB_SERVER_URL.TrimEnd('/')
          $origin = "$server/$env:GITHUB_REPOSITORY.git"
          if (@(git -C $ws remote) -contains "origin") {
            git -C $ws remote set-url origin $origin
          } else {
            git -C $ws remote add origin $origin
          }
          if ($LASTEXITCODE -ne 0) { throw "git remote setup failed" }
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:REPO_TOKEN"))
          git -C $ws -c "http.extraheader=AUTHORIZATION: basic $b64" -c protocol.version=2 fetch -q --prune --no-recurse-submodules origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "git fetch from local Gitea failed" }
          git -C $ws checkout -q -f $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "git checkout $env:GITHUB_SHA failed" }
          git -C $ws log --oneline -1

      - name: Tool versions
        run: |
          git --version
          python --version

      - name: Check PowerShell scripts
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\check_text_encoding.ps1
          powershell -ExecutionPolicy Bypass -File scripts\check_dependency_versions.ps1
          $roots = @("backend/scripts", "android/scripts", "scripts") | Where-Object { Test-Path $_ }
          $files = Get-ChildItem -Path $roots -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($file.FullName)
            $hasBom = $bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF
            if (-not $hasBom) {
              throw "$($file.FullName) must be UTF-8 with BOM for Windows PowerShell 5.1"
            }
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw -Encoding UTF8 -LiteralPath $file.FullName), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$($file.FullName) syntax error: $($errors[0].Message)"
            }
            Write-Host "OK $($file.FullName)"
          }

      - name: Install backend dependencies
        working-directory: backend
        run: |
          if (Test-Path .ci-venv) { Remove-Item -Recurse -Force .ci-venv }
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Compile backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m compileall app scripts tests

      - name: Lint backend
        working-directory: backend
        run: .\.ci-venv\Scripts\ruff.exe check app scripts tests

      - name: Test backend
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe -m pytest --cov=app --cov-report=term-missing

      - name: API contract
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\check_api_contract.py

      - name: Test file-backed SQLite lane
        working-directory: backend
        env:
          XPJ_TEST_FILE_BACKED: "1"
        run: .\.ci-venv\Scripts\python.exe -m pytest -q -m file_backed_only

      - name: Smoke test
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\smoke_test.py

      - name: Release audit
        working-directory: backend
        run: .\.ci-venv\Scripts\python.exe scripts\release_audit.py

      - name: Dependency vulnerability scan
        working-directory: backend
        env:
          PYTHONUTF8: "1"
        run: |
          .\.ci-venv\Scripts\python.exe -m pip install pip-audit
          .\.ci-venv\Scripts\python.exe -m pip_audit --strict --vulnerability-service osv -r requirements.txt -r requirements-dev.txt

  backend-postgres:
    name: Backend (PostgreSQL)
    # ADR-0041 dialect-proofing on the live (gitea) CI. backend-full above runs
    # the suite on SQLite (dev dialect); this lane exercises the production
    # PostgreSQL engine so dialect drift fails a PR instead of surfacing in prod.
    # The original lane was .github/workflows/ci.yml on a Linux runner with a
    # postgres service container — dead since the GitHub→Gitea move. The gitea
    # runner is Windows + no Docker, so we spin an ephemeral PostgreSQL via the
    # locally-installed initdb (PG 17 on the home-server runner) on port 5433, so
    # it never touches the prod cluster on 5432. Torn down in an always() step.
    runs-on: windows-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: backend
        shell: powershell

    steps:
      - name: Checkout (offline — local Gitea, no github.com)
        working-directory: ${{ github.workspace }}
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          $ws = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          Get-ChildItem -LiteralPath $ws -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          git init -q $ws
          if ($LASTEXITCODE -ne 0) { throw "git init failed" }
          $server = $env:GITHUB_SERVER_URL.TrimEnd('/')
          $origin = "$server/$env:GITHUB_REPOSITORY.git"
          if (@(git -C $ws remote) -contains "origin") {
            git -C $ws remote set-url origin $origin
          } else {
            git -C $ws remote add origin $origin
          }
          if ($LASTEXITCODE -ne 0) { throw "git remote setup failed" }
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:REPO_TOKEN"))
          git -C $ws -c "http.extraheader=AUTHORIZATION: basic $b64" -c protocol.version=2 fetch -q --prune --no-recurse-submodules origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "git fetch from local Gitea failed" }
          git -C $ws checkout -q -f $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "git checkout $env:GITHUB_SHA failed" }
          git -C $ws log --oneline -1

      - name: Install backend dependencies
        run: |
          if (Test-Path .ci-venv) { Remove-Item -Recurse -Force .ci-venv }
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Start ephemeral PostgreSQL (initdb — no Docker on the Windows runner)
        run: |
          $pgctl = Get-ChildItem 'C:\Program Files\PostgreSQL\*\bin\pg_ctl.exe' -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $pgctl) { throw "PostgreSQL not installed on runner (expected C:\Program Files\PostgreSQL\<ver>\bin)" }
          $pgbin = $pgctl.DirectoryName
          $runid = if ($env:GITHUB_RUN_ID) { $env:GITHUB_RUN_ID } else { 'local' }
          $datadir = Join-Path $env:TEMP "xpj_pg_ci_$runid"
          if (Test-Path $datadir) { Remove-Item -Recurse -Force $datadir }
          & "$pgbin\initdb.exe" -D $datadir -U postgres --auth=trust -E UTF8 --locale=C | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "initdb failed" }
          & "$pgbin\pg_ctl.exe" -D $datadir -o "-p 5433 -c listen_addresses=localhost" -l "$datadir\server.log" -w start
          if ($LASTEXITCODE -ne 0) { if (Test-Path "$datadir\server.log") { Get-Content "$datadir\server.log" }; throw "pg_ctl start failed" }
          & "$pgbin\createdb.exe" -h localhost -p 5433 -U postgres xpj_smoke
          if ($LASTEXITCODE -ne 0) { throw "createdb xpj_smoke failed" }
          & "$pgbin\createdb.exe" -h localhost -p 5433 -U postgres xpj_test
          if ($LASTEXITCODE -ne 0) { throw "createdb xpj_test failed" }
          Write-Host "ephemeral PostgreSQL up on 127.0.0.1:5433 (xpj_smoke + xpj_test)"

      - name: Verify PostgreSQL is reachable
        # Guard against a vacuous green: if the URL ever drops back to SQLite the
        # lane would pass without exercising PG. Assert it is Postgres + connect.
        env:
          SMOKE_DATABASE_URL: postgresql+psycopg://postgres@localhost:5433/xpj_smoke
        run: .\.ci-venv\Scripts\python.exe -c "import os, psycopg; url = os.environ['SMOKE_DATABASE_URL']; assert url.startswith('postgresql'), url; psycopg.connect(url.replace('+psycopg', '')).close(); print('PG reachable:', url.rsplit('@', 1)[-1])"

      - name: PostgreSQL end-to-end smoke (ADR-0041)
        # Full bootstrap -> upload -> OCC-token confirm flow against real PG: proves
        # create_all + Alembic replay (incl. tag-management 20260606_0001) is
        # dialect-safe and the SQLite-only startup machinery no-ops cleanly.
        env:
          SMOKE_DATABASE_URL: postgresql+psycopg://postgres@localhost:5433/xpj_smoke
        run: .\.ci-venv\Scripts\python.exe scripts\smoke_test.py

      - name: PostgreSQL pytest suite (ADR-0041)
        # The full suite on real PostgreSQL — the comprehensive dialect catch the
        # SQLite lane can't see. conftest skips SQLite-only machinery + the
        # migrate_sqlite_schema replay (test_database_migration_*) on non-sqlite.
        # Uses its own xpj_test DB so the smoke's data never collides.
        env:
          XPJ_TEST_DATABASE_URL: postgresql+psycopg://postgres@localhost:5433/xpj_test
        run: .\.ci-venv\Scripts\python.exe -m pytest -q -ra --tb=short -p no:cacheprovider

      - name: Stop ephemeral PostgreSQL
        if: always()
        run: |
          $runid = if ($env:GITHUB_RUN_ID) { $env:GITHUB_RUN_ID } else { 'local' }
          $datadir = Join-Path $env:TEMP "xpj_pg_ci_$runid"
          $pgctl = Get-ChildItem 'C:\Program Files\PostgreSQL\*\bin\pg_ctl.exe' -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if ($pgctl -and (Test-Path $datadir)) { & "$($pgctl.DirectoryName)\pg_ctl.exe" -D $datadir stop -m fast -w }
          if (Test-Path $datadir) { Remove-Item -Recurse -Force $datadir -ErrorAction SilentlyContinue }
          Write-Host "ephemeral PostgreSQL torn down"

  desktop-manager:
    name: Desktop manager
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop
        shell: powershell

    steps:
      - name: Checkout (offline — local Gitea, no github.com)
        working-directory: ${{ github.workspace }}
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          $ws = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          Get-ChildItem -LiteralPath $ws -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          git init -q $ws
          if ($LASTEXITCODE -ne 0) { throw "git init failed" }
          $server = $env:GITHUB_SERVER_URL.TrimEnd('/')
          $origin = "$server/$env:GITHUB_REPOSITORY.git"
          if (@(git -C $ws remote) -contains "origin") {
            git -C $ws remote set-url origin $origin
          } else {
            git -C $ws remote add origin $origin
          }
          if ($LASTEXITCODE -ne 0) { throw "git remote setup failed" }
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:REPO_TOKEN"))
          git -C $ws -c "http.extraheader=AUTHORIZATION: basic $b64" -c protocol.version=2 fetch -q --prune --no-recurse-submodules origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "git fetch from local Gitea failed" }
          git -C $ws checkout -q -f $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "git checkout $env:GITHUB_SHA failed" }
          git -C $ws log --oneline -1

      - name: Install desktop dependencies
        run: |
          if (Test-Path .ci-venv) { Remove-Item -Recurse -Force .ci-venv }
          python -m venv .ci-venv
          .\.ci-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.ci-venv\Scripts\python.exe -m pip install -r requirements.txt python-dotenv pytest ruff

      - name: Compile desktop manager
        run: .\.ci-venv\Scripts\python.exe -m compileall backend_manager tests

      - name: Lint desktop manager
        run: .\.ci-venv\Scripts\ruff.exe check backend_manager tests

      - name: Test desktop manager
        run: .\.ci-venv\Scripts\python.exe -m pytest -q

  android-unit:
    name: Android unit/build
    runs-on: windows-latest

    defaults:
      run:
        working-directory: android
        shell: powershell

    env:
      TICKETBOX_SERVER_URL: https://api.zen70.cn
      ANDROID_HOME: E:\projects\xiaopiaojia\.toolchains\android-sdk
      ANDROID_SDK_ROOT: E:\projects\xiaopiaojia\.toolchains\android-sdk

    steps:
      - name: Checkout (offline — local Gitea, no github.com)
        working-directory: ${{ github.workspace }}
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          $ws = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          Get-ChildItem -LiteralPath $ws -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          git init -q $ws
          if ($LASTEXITCODE -ne 0) { throw "git init failed" }
          $server = $env:GITHUB_SERVER_URL.TrimEnd('/')
          $origin = "$server/$env:GITHUB_REPOSITORY.git"
          if (@(git -C $ws remote) -contains "origin") {
            git -C $ws remote set-url origin $origin
          } else {
            git -C $ws remote add origin $origin
          }
          if ($LASTEXITCODE -ne 0) { throw "git remote setup failed" }
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:REPO_TOKEN"))
          git -C $ws -c "http.extraheader=AUTHORIZATION: basic $b64" -c protocol.version=2 fetch -q --prune --no-recurse-submodules origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "git fetch from local Gitea failed" }
          git -C $ws checkout -q -f $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "git checkout $env:GITHUB_SHA failed" }
          git -C $ws log --oneline -1

      - name: Point Gradle at local Android SDK
        run: |
          if (-not (Test-Path $env:ANDROID_HOME)) {
            throw "Android SDK not found: $env:ANDROID_HOME"
          }
          "sdk.dir=E\:/projects/xiaopiaojia/.toolchains/android-sdk" | Set-Content -Encoding ASCII -Path local.properties
          "ticketbox.serverUrl=$env:TICKETBOX_SERVER_URL" | Add-Content -Encoding ASCII -Path local.properties

      - name: Gradle / JVM versions
        run: .\gradlew.bat --no-daemon --version

      - name: Compile and unit tests
        run: .\gradlew.bat --no-daemon :app:compileGrayDebugKotlin :app:testGrayDebugUnitTest

      - name: Assert test count equals baseline
        run: .\gradlew.bat --no-daemon :app:assertAndroidTestCountEqualsBaseline

      - name: Lint
        run: .\gradlew.bat --no-daemon :app:lintGrayDebug

      - name: Assemble gray debug APK
        run: .\gradlew.bat --no-daemon :app:assembleGrayDebug

      - name: Assemble internal debug APK
        run: .\gradlew.bat --no-daemon :app:assembleInternalDebug
