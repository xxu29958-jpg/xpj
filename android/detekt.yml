# Kotlin complexity gate — the exact machine translation of the six thresholds
# in docs/rules/CODE_QUALITY_STANDARDS.md ("Kotlin / Android" table). Nothing
# else is active on purpose: style/naming/etc. rule sets were never part of the
# review baseline and would need their own sign-off before joining the gate.
# Applied via :app:detekt (plain, non-type-resolving) with
# android/app/detekt-baseline.xml freezing pre-existing violations.

build:
  maxIssues: 0

comments:
  active: false

complexity:
  active: true
  # The six gated rules — thresholds restated even where they equal the detekt
  # default, so a detekt version bump can never silently move the gate.
  CyclomaticComplexMethod:
    active: true
    threshold: 14
  LargeClass:
    active: true
    threshold: 600
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 5
    constructorThreshold: 6
    ignoreDefaultParameters: false
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    thresholdInFiles: 11
    thresholdInClasses: 11
    thresholdInInterfaces: 11
    thresholdInObjects: 11
    thresholdInEnums: 11
  # Default-active complexity rules outside the documented table — off.
  ComplexCondition:
    active: false
  ComplexInterface:
    active: false
  CognitiveComplexMethod:
    active: false
  LabeledExpression:
    active: false
  MethodOverloading:
    active: false
  NamedArguments:
    active: false
  NestedScopeFunctions:
    active: false
  ReplaceSafeCallChainWithRun:
    active: false
  StringLiteralDuplication:
    active: false

coroutines:
  active: false

empty-blocks:
  active: false

exceptions:
  active: false

naming:
  active: false

performance:
  active: false

potential-bugs:
  active: false

style:
  active: false
