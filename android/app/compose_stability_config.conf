// Compose compiler stability configuration -- issue #64 A2.
//
// Format (Compose compiler): one fully-qualified class name per line (wildcards
// allowed); lines starting with "//" are comments; blank lines ignored. Listing
// a type here tells the compiler to treat it as STABLE, so any @Composable that
// takes it -- directly, or as the element type of a List/Map parameter -- becomes
// skippable and stops recomposing every list row when an unrelated part of the
// parent state changes.
//
// Why a config file instead of @Stable/@Immutable annotations:
//   issue #64 A2 hard rule -- domain/model must NOT import Compose. Annotating the
//   data classes would pull androidx.compose.runtime into the domain layer. This
//   external file carries the same "trust me, used immutably" signal without the
//   dependency, and keeps the promise auditable in one place.
//
// Discipline:
//   - Only list types the metrics report (-Pticketbox.composeMetrics=true; see
//     app/build.gradle.kts) actually flagged unstable AND that are genuinely used
//     immutably (all reads, never mutated after construction).
//   - A line here is a PROMISE the type behaves immutably. If you later add a
//     `var` or a mutable collection field to a listed type, recomposition
//     correctness breaks silently -- re-verify before adding.
//
// Verified findings (./gradlew :app:compileGrayDebugKotlin -Pticketbox.composeMetrics=true,
// app/build/compose_compiler/app-classes.txt + app-composables.txt):
//   - The hot list ELEMENT models the issue guessed at (Expense, Debt, CurrencyCode)
//     are ALREADY stable: all-val data classes / enum, single :app module compiled
//     with the Compose plugin, strong-skipping on. Nothing to do for them.
//   - The one genuinely-unstable type in a hot scrolling list is UiText. WITHOUT
//     the entries below, UiText.Res is unstable because `args: List<Any>`, which
//     makes viewmodel.GlobalSearchResultUi "runtime/uncertain" (its
//     `matchedField: UiText`) and SearchResultCard's `result` param non-
//     structurally-skippable. UiText is immutable value data by design (docstring:
//     "plain data ... safe to hold in VM state"; the `res()` factory defensively
//     copies via `args.toList()`), so marking it stable is a sound promise and lets
//     search rows skip on structural equality when the results list is rebuilt.
//     (After adding the entries, the metrics report shows UiText.Res,
//     GlobalSearchResultUi and SearchResultCard's `result` flipped to stable.)
//
// (Other List-bearing models — MonthlyStats, ConnectionDiagnostics, etc. — are also
// unstable but are NOT rendered in hot scrolling lists, so they stay off this list
// per the issue's "target only hot list models" rule.)
com.ticketbox.domain.model.UiText
com.ticketbox.domain.model.UiText.Res
com.ticketbox.domain.model.UiText.Compound
