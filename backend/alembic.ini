; v1.1 Batch 3: Alembic config for the ticketbox backend.
;
; Revisions live under backend/migrations/versions. The sqlalchemy.url
; value is a placeholder; env.py reads DATABASE_URL from the same .env
; / environment the application itself uses.
;
; Run from backend/:
;   .venv/Scripts/alembic upgrade head
;   .venv/Scripts/alembic revision --autogenerate -m "..."
;   .venv/Scripts/alembic current
;
; init_db() in app/database/__init__.py stamps the baseline revision
; on first startup so existing pre-Alembic DBs migrate forward without
; an explicit alembic stamp step.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = sqlite:///data/ticketbox.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
