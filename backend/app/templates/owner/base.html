<!DOCTYPE html>
<html lang="zh-CN" data-owner data-theme="{{ ui_theme or 'paper' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}小票夹 Owner Console{% endblock %}</title>
  <link rel="stylesheet" href="/static/owner/owner.css">
  <link rel="stylesheet" href="/static/owner/components/nav.css?v={{ backend_version }}">
  <link rel="stylesheet" href="/static/owner/components/buttons.css?v={{ backend_version }}">
  <link rel="stylesheet" href="/static/owner/components/badges.css?v={{ backend_version }}">
  <link rel="stylesheet" href="/static/owner/components/feedback.css?v={{ backend_version }}">
  <link rel="stylesheet" href="/static/owner/components/utilities.css?v={{ backend_version }}">
  <link rel="stylesheet" href="/static/shared/confirm-modal.css?v={{ backend_version }}">
  <script defer src="/static/shared/confirm-modal.js?v={{ backend_version }}"></script>
  <script defer src="/static/owner/owner-feedback.js?v={{ backend_version }}"></script>
</head>
<body>
<nav class="nav">
  <a class="brand" href="/owner">🎫 小票夹</a>
  <a href="/owner" {% if request.url.path == '/owner' %}class="active"{% endif %}>仪表盘</a>
  <a href="/owner/devices" {% if '/devices' in request.url.path %}class="active"{% endif %}>设备</a>
  <a href="/owner/ledgers" {% if '/ledgers' in request.url.path %}class="active"{% endif %}>账本</a>
  <a href="/owner/rule-applications" {% if '/rule-applications' in request.url.path %}class="active"{% endif %}>规则审计</a>
  <a href="/owner/pairing" {% if '/pairing' in request.url.path %}class="active"{% endif %}>绑定码</a>
  <a href="/owner/upload-links" {% if '/upload-links' in request.url.path %}class="active"{% endif %}>上传链接</a>
  <a href="/owner/backups" {% if '/backups' in request.url.path %}class="active"{% endif %}>备份</a>
  <a href="/owner/migration-readiness" {% if '/migration-readiness' in request.url.path %}class="active"{% endif %}>迁移预检</a>
  <a href="/owner/diagnostics" {% if '/diagnostics' in request.url.path %}class="active"{% endif %}>诊断</a>
  <a href="/owner/settings" {% if '/settings' in request.url.path %}class="active"{% endif %}>设置</a>
  <span class="grow"></span>
  <span class="version-tag">v{{ backend_version }} · 本机管理后台</span>
</nav>
<div class="page">
{% block content %}{% endblock %}
</div>
</body>
</html>
