<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>小票夹 网页版 — 输入绑定码</title>
  <link rel="stylesheet" href="/static/shared/tokens.css">
  <link rel="stylesheet" href="/static/web/pages/auth-login.css?v={{ backend_version }}">
  <script defer src="/static/shared/csrf.js?v={{ backend_version }}"></script>
</head>
<body>
  <main class="card">
    <h1>小票夹</h1>
    <p class="hint">向账本所有者索取 8 位绑定码后，在此输入。</p>

    {% if error_message %}
    <div class="error" role="alert">{{ error_message }}</div>
    {% endif %}

    <form method="post" action="/web/auth/login" autocomplete="off">
      {{ csrf_field|safe }}
      <input type="hidden" name="next" value="{{ next_url }}">

      <label for="pairing_code">绑定码（8 位数字）</label>
      <input
        id="pairing_code"
        name="pairing_code"
        type="text"
        inputmode="numeric"
        pattern="[0-9]{8}"
        maxlength="8"
        autofocus
        required
      >

      <label for="device_name">浏览器名称（可选）</label>
      <input
        id="device_name"
        name="device_name"
        type="text"
        placeholder="例如：客厅 iPad"
        maxlength="120"
      >

      <button type="submit">登录</button>
    </form>

    <p class="foot">
      绑定码一次性使用，每位家庭成员需要单独的码。<br>
      旧版静态 token 已废弃；不要在此输入旧的 APP_TOKEN。
    </p>
  </main>
</body>
</html>
