<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Jiajia mascot expression sheet for Rive</title>
  <desc id="desc">Six vector expression poses for Jiajia: sleep, wave, success, confetti, shock, and shrug/search, with named groups for Rive rigging.</desc>
  <defs>
    <style>
      :root {
        --body: #f3e6cd;
        --body-hi: #fff7e8;
        --outline: #231f1a;
        --wire: #d9d2c8;
        --receipt: #fffdf7;
        --receipt-line: #d7d0c5;
        --accent: #e87359;
        --blush: #f39c86;
        --shadow: rgba(35,31,26,.13);
        --success: #5f8a46;
        --warn: #d19a35;
        --info: #5fa8c3;
      }
      .outline { stroke: #231f1a; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #231f1a; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-outline { fill: none; stroke: #231f1a; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; }
      .wire-inner { fill: none; stroke: #d9d2c8; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .body-fill { fill: #f3e6cd; }
      .highlight { fill: #fff7e8; opacity: .48; }
      .receipt-fill { fill: #fffdf7; }
      .receipt-line { stroke: #d7d0c5; stroke-width: 5; stroke-linecap: round; }
      .eye { fill: #231f1a; }
      .shine { fill: #fffdf7; }
      .blush { fill: #f39c86; }
      .accent { fill: #e87359; }
      .shadow { fill: rgba(35,31,26,.13); }
      .none { fill: none; }
    </style>
  </defs>

